server:
  port: 8080

spring:
  application:
    name: knowledge-base-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/knowledge_base_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

knowledge:
  categories:
    - Java基础
    - Spring
    - SpringBoot
    - MyBatis
    - MySQL
    - Redis
    - JVM
    - 并发编程
    - 分布式系统
    - 微服务
    - 设计模式
    - 数据结构与算法
    - 计算机网络
    - 操作系统
    - 前端技术
    - 软件工程

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:your-api-key}
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
