server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        http-only: true
        same-site: strict

spring:
  application:
    name: knowledge-base-system
  autoconfigure:
    exclude: dev.langchain4j.openai.spring.AutoConfig

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/knowledge_base_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

knowledge:
  categories: 大模型,Java基础,Spring,SpringBoot,MyBatis,MySQL,Redis,JVM,并发编程,分布式系统,微服务,设计模式,数据结构与算法,计算机网络,操作系统,前端技术,软件工程

markitdown:
  python-path: ${MARKITDOWN_PYTHON:E:/Develop/tools/.venv/Scripts/python.exe}
  upload-dir: ${MARKITDOWN_UPLOAD_DIR:target/markitdown-uploads}
  timeout-seconds: 60
  max-markdown-chars: 300000
  chunk-target-chars: 1000
  chunk-overlap-chars: 150

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
